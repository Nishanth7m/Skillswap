services:
  # 1. Backend Web Service
  - type: web
    name: skillswap-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Must be set in the Render Dashboard (your standard MongoDB Atlas connection string)
      - key: JWT_ACCESS_SECRET
        sync: false # Must be set in the Render Dashboard
      - key: JWT_REFRESH_SECRET
        sync: false # Must be set in the Render Dashboard
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: CORS_ORIGIN
        sync: false # Set manually in Render Dashboard after frontend deploys to break circular dependency

  # 2. Frontend Static Site
  - type: static
    name: skillswap-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: skillswap-backend
          property: url
